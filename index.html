<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>認識臺灣水生動物圖鑑</title>
    
    <style>
        /* =========================================
           1. 全域與版面基礎設定
        ========================================= */
        :root {
            --primary-blue: #0077be;
            --dark-blue: #00568c;
            --accent-green: #004d40;
            --danger-red: #d32f2f;
            --bg-light: #f4f7f9;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
        }

        /* =========================================
           2. 標題與搜尋框 UI 設計
        ========================================= */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            color: var(--primary-blue);
            margin: 0 0 10px 0;
            font-size: 2.2em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95em;
            margin: 0;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        #fishName {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        #fishName:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 4px 12px rgba(0, 119, 190, 0.15);
        }

        #searchBtn {
            padding: 15px 30px;
            font-size: 1.1em;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0, 119, 190, 0.2);
            white-space: nowrap;
        }

        #searchBtn:hover {
            background-color: var(--dark-blue);
        }

        #searchBtn:active {
            transform: scale(0.98);
        }

        /* =========================================
           3. 魚類卡片專屬 UI 設計
        ========================================= */
        .fish-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e8f0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .fish-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 119, 190, 0.15);
        }

        .fish-title {
            margin: 0 0 4px 0;
            color: var(--primary-blue);
            font-size: 1.4em;
            font-weight: 700;
        }

        .fish-sci-name {
            font-size: 1.05em;
            color: var(--danger-red);
            margin-bottom: 16px;
            font-style: italic;
        }

        .fish-aliases {
            font-size: 0.9em;
            color: var(--text-muted);
            background: #f8f9fa;
            padding: 10px 14px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-blue);
            margin-bottom: 16px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 0.9em;
            color: #444;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .data-item strong {
            color: var(--text-muted);
        }

        .conservation-box {
            background: #fdfaf6;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #f0e6d2;
            margin-bottom: 20px;
        }

        .conservation-title {
            font-size: 0.85em;
            color: #795548;
            font-weight: 700;
            margin-bottom: 12px;
            border-bottom: 1px solid #f0e6d2;
            padding-bottom: 6px;
        }

        .conservation-tags {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tag-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tag-label {
            font-size: 0.75em;
            color: #888;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            border-top: 1px dashed #e0e0e0;
            padding-top: 20px;
            flex-wrap: wrap;
        }

        .btn-wiki, .btn-fishbase, .btn-taicol {
            flex: 1;
            min-width: 140px;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95em;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-wiki { background: var(--primary-blue); }
        .btn-wiki:hover { background: var(--dark-blue); }
        
        .btn-taicol { background: #ef6c00; }
        .btn-taicol:hover { background: #d66200; }

        .btn-fishbase { background: var(--accent-green); }
        .btn-fishbase:hover { background: #00332a; }

        .wiki-content {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #f0f7ff;
            border-radius: 12px;
            border-left: 4px solid var(--primary-blue);
            font-size: 0.95em;
            line-height: 1.6;
            color: var(--text-main);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .data-credits {
            text-align: center;
            font-size: 0.85em;
            color: #888;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .search-box { flex-direction: column; }
            .data-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6em; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🐟 認識臺灣水生動物圖鑑</h1>
            <p>請輸入動物俗名、學名或科別（例如：石斑、吳郭魚、慈鯛科）</p>
            <p style="color: #d32f2f; font-weight: bold; font-size: 0.9em; margin-top: 10px; background: #fff3f3; display: inline-block; padding: 5px 15px; border-radius: 20px;">
                💡 註明：如果找到不是水生動物是正常的，因爲資料排除不了ＸＤＤＤＤ
            </p>
        </div>

        <div class="search-box">
            <input type="text" id="fishName" placeholder="開始探索圖鑑資料..." autocomplete="off">
            <button id="searchBtn">🔍 開始檢索</button>
        </div>

        <div id="result">
            </div>
    </div>

    <script>
        (function() {
            const script = document.createElement('script');
            // 在檔名後方加上亂數或時間戳記，徹底殺死快取
            script.src = 'main.js?v=' + Date.now();
            script.async = true;
            document.body.appendChild(script);
            console.log("🚀 強制更新：已載入最新腳本版本 " + script.src);
        })();
    </script>

</body>
</html>
