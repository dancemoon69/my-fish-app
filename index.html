<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>臺灣水生動物圖鑑</title>
    
    <style>
        /* =========================================
           1. 全域與版面基礎設定
        ========================================= */
        :root {
            --primary-blue: #0077be;
            --dark-blue: #00568c;
            --accent-green: #004d40;
            --danger-red: #d32f2f;
            --bg-light: #f4f7f9;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* =========================================
           2. 標題與搜尋框 UI
        ========================================= */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            color: var(--primary-blue);
            margin: 0 0 10px 0;
            font-size: 2.2em;
        }

        .header .warning { 
            color: var(--danger-red); font-weight: bold; font-size: 0.85em; 
            background: #fff3f3; padding: 8px 15px; border-radius: 20px; 
            display: inline-block; margin-top: 10px; border: 1px solid #ffcdd2;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        #fishName {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        #fishName:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 4px 12px rgba(0, 119, 190, 0.15);
        }

        #searchBtn {
            padding: 15px 30px;
            font-size: 1.1em;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 119, 190, 0.2);
            white-space: nowrap;
        }

        /* =========================================
           3. 魚類卡片佈局 (左右並排版)
        ========================================= */
        .fish-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e8f0;
            display: flex; /* 桌面版左右並排 */
            gap: 25px;
            align-items: flex-start;
            transition: 0.2s ease;
        }

        .fish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 119, 190, 0.15);
        }

        /* 圖片容器：不裁切生物 */
        .fish-img-container {
            flex: 0 0 260px; /* 固定寬度 */
            height: 180px;
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
        }

        .fish-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 💡 確保不裁切到生物身體 */
        }

        .fish-info { flex: 1; }

        .fish-title {
            margin: 0 0 5px 0;
            color: var(--primary-blue);
            font-size: 1.5em;
        }

        .fish-sci-name {
            font-size: 1.1em;
            color: var(--danger-red);
            margin-bottom: 12px;
            font-style: italic;
        }

        .fish-aliases {
            font-size: 0.9em;
            color: var(--text-muted);
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .conservation-box {
            background: #fdfaf6;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #f0e6d2;
            margin-bottom: 15px;
        }

        .conservation-title {
            font-size: 0.8em;
            font-weight: bold;
            color: #795548;
            margin-bottom: 8px;
        }

        .conservation-tags { display: flex; gap: 15px; flex-wrap: wrap; }
        .tag-group { display: flex; flex-direction: column; gap: 4px; }
        .tag-label { font-size: 0.7em; color: #999; }

        /* 按鈕區 */
        .action-buttons {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            font-size: 0.9em;
            cursor: pointer;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-wiki { background: var(--primary-blue); }
        .btn-taicol { background: #ef6c00; }
        .btn-fishbase { background: var(--accent-green); }

        .wiki-content {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 10px;
            font-size: 0.9em;
            border-left: 4px solid var(--primary-blue);
        }

        .data-credits {
            text-align: center;
            font-size: 0.8em;
            color: #888;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #ddd;
        }

        /* 手機版適應 */
        @media (max-width: 600px) {
            .fish-card { flex-direction: column; }
            .fish-img-container { width: 100%; flex: none; height: 200px; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🐟 臺灣水生動物圖鑑</h1>
            <p>輸入俗名、學名或科別進行檢索</p>
            <div class="warning">💡 註明：如果找到不是水生動物是正常的，因爲資料排除不了ＸＤＤＤＤ</div>
        </div>

        <div class="search-box">
            <input type="text" id="fishName" placeholder="搜尋關鍵字後按 Enter..." autocomplete="off">
            <button id="searchBtn">🔍 搜尋</button>
        </div>

        <div id="result"></div>

        <div class="data-credits">
            資料來源：<a href="https://taicol.tw/" target="_blank">TaiCOL</a> | 
            <a href="https://www.fishbase.se/" target="_blank">FishBase</a> | 
            <a href="https://zh.wikipedia.org/" target="_blank">Wikipedia</a>
            <br>※ 系統透過開放 API 介接，資訊僅供參考。
        </div>
    </div>

    <script>
        (function() {
            const script = document.createElement('script');
            script.src = 'main.js?v=' + Date.now();
            script.async = true;
            document.body.appendChild(script);
        })();
    </script>

</body>
</html>
