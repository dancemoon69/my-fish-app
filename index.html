<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>認識臺灣水生動物圖鑑 - 強制更新版</title>
    
    <style>
        :root {
            --primary-blue: #0077be;
            --dark-blue: #00568c;
            --accent-green: #004d40;
            --danger-red: #d32f2f;
            --bg-light: #f4f7f9;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary-blue); margin-bottom: 10px; }
        .header .warning { 
            color: #d32f2f; font-weight: bold; font-size: 0.9em; 
            background: #fff3f3; padding: 8px 15px; border-radius: 20px; 
            display: inline-block; margin-top: 10px; border: 1px solid #ffcdd2;
        }

        .search-box { display: flex; gap: 12px; margin-bottom: 30px; }
        #fishName {
            flex: 1; padding: 15px; font-size: 1.1em;
            border: 2px solid #ddd; border-radius: 12px; outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        #fishName:focus { border-color: var(--primary-blue); }
        
        #searchBtn {
            padding: 15px 30px; background: var(--primary-blue);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        #searchBtn:hover { background: var(--dark-blue); }

        /* 卡片設計 */
        .fish-card {
            background: white; border-radius: 16px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }
        .fish-title { color: var(--primary-blue); margin: 0; font-size: 1.5em; }
        .fish-sci-name { color: var(--danger-red); font-style: italic; margin-bottom: 15px; font-size: 1.1em; }
        
        .conservation-box { 
            background: #fdfaf6; padding: 15px; border-radius: 12px; 
            border: 1px solid #f0e6d2; margin: 15px 0;
        }
        .tag-group { display: flex; align-items: center; margin-bottom: 8px; }
        .tag-label { width: 100px; font-size: 0.85em; color: #888; font-weight: bold; }

        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; }
        .btn { 
            flex: 1; min-width: 100px; padding: 12px; border-radius: 10px; text-align: center;
            text-decoration: none; font-weight: bold; font-size: 0.95em; color: white; border: none; cursor: pointer;
        }
        .btn-wiki { background: var(--primary-blue); }
        .btn-taicol { background: #ef6c00; }
        .btn-fishbase { background: var(--accent-green); }

        .wiki-content { 
            display: none; margin-top: 20px; padding: 20px; 
            background: #f0f7ff; border-radius: 12px; border-left: 5px solid var(--primary-blue);
            line-height: 1.7; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🐟 認識臺灣水生動物圖鑑</h1>
            <p>請輸入俗名、學名或科別（例如：石斑、慈鯛、鮭魚）</p>
            <div class="warning">💡 註明：如果找到不是水生動物是正常的，因爲資料排除不了ＸＤＤＤＤ</div>
        </div>

        <div class="search-box">
            <input type="text" id="fishName" placeholder="輸入關鍵字後按 Enter 搜尋..." autocomplete="off">
            <button id="searchBtn">🔍 開始檢索</button>
        </div>

        <div id="result">
            </div>
    </div>

    <script>
        (function() {
            const script = document.createElement('script');
            // 在檔名後加上時間戳記，徹底殺死快取
            script.src = 'main.js?t=' + new Date().getTime();
            script.async = true;
            document.body.appendChild(script);
            console.log("🚀 已啟動強制更新機制，載入版本：" + script.src);
        })();
    </script>

    <script>
        // 這裡可以放備用的 JS 代碼，確保即便外部檔案失效，網頁依然能跑
        console.log("圖鑑系統已就緒。");
    </script>
</body>
</html>
